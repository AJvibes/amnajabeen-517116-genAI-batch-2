<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArgusScorer — Argument Quality Scorer</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:hsl(60 14% 95%);color:hsl(0 0% 4%);min-height:100vh}
.serif{font-family:'Cormorant Garamond',serif}
.mono{font-family:'IBM Plex Mono',monospace}
@keyframes snap-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.snap-in{animation:snap-in 0.18s ease-out both}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
textarea{resize:vertical}
button:disabled{opacity:0.4;cursor:not-allowed}
.history-scroll::-webkit-scrollbar{width:8px}
.history-scroll::-webkit-scrollbar-track{background:transparent}
.history-scroll::-webkit-scrollbar-thumb{background:black;border:2px solid white}
.chat-scroll{overflow-y:auto;max-height:380px;scroll-behavior:smooth}
.chat-scroll::-webkit-scrollbar{width:6px}
.chat-scroll::-webkit-scrollbar-thumb{background:black}
.score-bar-clickable{cursor:pointer;transition:opacity 0.15s}
.score-bar-clickable:hover{opacity:0.75}
.tabs{display:flex;gap:24px;border-bottom:2px solid black;padding:0 clamp(20px,5vw,56px)}
.sub-tabs{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:24px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const {useState,useEffect,useRef,useCallback}=React;
const MAX_CHARS=8000,MIN_CHARS=10;
const API_BASE = '';

async function apiPost(endpoint, body) {
  const res = await fetch(API_BASE + endpoint, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function apiGet(endpoint) {
  const res = await fetch(API_BASE + endpoint);
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function apiDelete(endpoint) {
  const res = await fetch(API_BASE + endpoint, {method: 'DELETE'});
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

function useRateLimiter(minMs=1000){
  const lastCall=useRef(0);
  return useCallback(()=>{
    const now=Date.now();
    if(now-lastCall.current<minMs)return false;
    lastCall.current=now;
    return true;
  },[minMs]);
}

function ErrorBanner({message,onDismiss}){
  if(!message)return null;
  return React.createElement('div',{style:{border:'2px solid #DC2626',background:'#FEF2F2',padding:'12px 16px',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'12px',marginBottom:'20px',boxShadow:'3px 3px 0 #DC2626'}},
    React.createElement('div',{style:{display:'flex',gap:'10px',alignItems:'flex-start'}},
      React.createElement('span',{style:{color:'#DC2626',fontWeight:700,flexShrink:0}},'⚠'),
      React.createElement('span',{className:'mono',style:{fontSize:'12px',color:'#DC2626',lineHeight:1.5}},message)
    ),
    React.createElement('button',{onClick:onDismiss,style:{background:'none',border:'none',cursor:'pointer',color:'#DC2626',fontWeight:700,fontSize:'16px',flexShrink:0,lineHeight:1}},'×')
  );
}

function SegBar({value=0,max=10,label,onClick,clickable}){
  const filled=Math.max(0,Math.min(max,Math.round(value)));
  return React.createElement('div',{
    style:{width:'100%'},
    className:clickable?'score-bar-clickable':'',
    onClick:onClick,
    title:clickable?`Click to explain ${label} score`:'',
    role:clickable?'button':undefined,
    tabIndex:clickable?0:undefined
  },
    React.createElement('div',{style:{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:'8px'}},
      React.createElement('span',{className:'mono',style:{fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.22em',fontWeight:700}},label,
        clickable&&React.createElement('span',{style:{fontSize:'9px',marginLeft:'6px',color:'rgba(0,0,0,0.4)',verticalAlign:'middle'}},'💬')
      ),
      React.createElement('span',{className:'mono',style:{fontSize:'20px',fontWeight:700}},value,React.createElement('span',{style:{color:'rgba(0,0,0,0.4)',fontSize:'14px'}},'/'+max))
    ),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(10,1fr)',gap:'3px',border:'2px solid black',padding:'3px',background:'white'}},
      Array.from({length:max}).map((_,i)=>React.createElement('div',{key:i,style:{height:'12px',background:i<filled?'black':'transparent'}}))
    )
  );
}

function Badge({text,bg,color}){
  return React.createElement('span',{className:'mono',style:{display:'inline-flex',alignItems:'center',border:'2px solid black',padding:'4px 12px',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.22em',fontWeight:700,background:bg,color}},text);
}

function DimensionExplainPanel({dimension,value,argument,onClose}){
  const [loading,setLoading]=useState(true);
  const [explanation,setExplanation]=useState('');
  const [error,setError]=useState('');
  const panelRef=useRef(null);

  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{
        const data = await apiPost('/api/explain', {argument, dimension, value});
        if(!cancelled)setExplanation(data.explanation);
      }catch(e){
        if(!cancelled)setError(e.message);
      }finally{
        if(!cancelled)setLoading(false);
      }
    })();
    return()=>{cancelled=true;};
  },[argument,dimension,value]);

  useEffect(()=>{
    const handler=(e)=>{if(panelRef.current&&!panelRef.current.contains(e.target))onClose();};
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[onClose]);

  return React.createElement('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:60,padding:'16px'}},
    React.createElement('div',{ref:panelRef,style:{background:'white',border:'2px solid black',boxShadow:'6px 6px 0 black',padding:'28px',maxWidth:'480px',width:'100%',position:'relative'}},
      React.createElement('button',{onClick:onClose,style:{position:'absolute',top:'12px',right:'12px',background:'none',border:'none',cursor:'pointer',fontSize:'18px',lineHeight:1}},'×'),
      React.createElement('div',{className:'mono',style:{fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.25em',color:'rgba(0,0,0,0.5)',marginBottom:'6px'}},'Score Explanation'),
      React.createElement('h3',{className:'serif',style:{fontSize:'22px',fontWeight:700,marginBottom:'16px',borderBottom:'3px solid black',paddingBottom:'6px',display:'inline-block'}},dimension,' · ',value,'/10'),
      loading
        ? React.createElement('div',{style:{display:'flex',gap:'10px',alignItems:'center',padding:'8px 0'}},
            React.createElement('span',{className:'spin'},'⟳'),
            React.createElement('span',{className:'mono',style:{fontSize:'12px',color:'rgba(0,0,0,0.6)'}},'Analyzing...')
          )
        : error
        ? React.createElement('p',{style:{color:'#DC2626',fontSize:'14px'}},error)
        : React.createElement('p',{style:{fontSize:'15px',lineHeight:1.75,color:'rgba(0,0,0,0.85)'}},explanation)
    )
  );
}

function DebateChat({argument,result}){
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const chatEndRef=useRef(null);
  const canSend=useRateLimiter(800);

  useEffect(()=>{
    chatEndRef.current?.scrollIntoView({behavior:'smooth'});
  },[messages]);

  const sendMessage=async()=>{
    if(!input.trim()||loading)return;
    if(!canSend())return;
    const userMsg={role:'user',content:input.trim()};
    const newMsgs=[...messages,userMsg];
    setMessages(newMsgs);
    setInput('');
    setLoading(true);
    setError('');
    try{
      const data = await apiPost('/api/debate', {
        argument,
        scores: result,
        messages: newMsgs
      });
      setMessages(prev=>[...prev,{role:'assistant',content:data.response}]);
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  };

  const handleKey=(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}};

  return React.createElement('div',{style:{marginTop:'32px',border:'2px solid black',background:'white',boxShadow:'4px 4px 0 black'}},
    React.createElement('div',{style:{borderBottom:'2px solid black',padding:'14px 20px',display:'flex',alignItems:'center',gap:'12px',background:'black',color:'white'}},
      React.createElement('span',{style:{fontSize:'18px'}},'⚔'),
      React.createElement('div',{},
        React.createElement('div',{className:'mono',style:{fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.22em',fontWeight:700}},'Multi-Turn Debate')
      )
    ),
    messages.length===0&&React.createElement('div',{style:{padding:'24px',borderBottom:'2px dashed rgba(0,0,0,0.2)'}},
      React.createElement('p',{className:'serif',style:{fontSize:'16px',fontStyle:'italic',color:'rgba(0,0,0,0.6)',lineHeight:1.6}},'The scorer knows your argument and its full report. Challenge a weakness, dispute a score, or ask for clarification.'),
      React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:'8px',marginTop:'12px'}},
        ["I disagree with weakness #1","Why is my evidence score so low?","What would make this a 9/10?"].map(s=>
          React.createElement('button',{key:s,onClick:()=>setInput(s),style:{fontFamily:'IBM Plex Mono',fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.15em',border:'2px solid black',background:'hsl(60 14% 95%)',padding:'5px 10px',cursor:'pointer'}},s)
        )
      )
    ),
    messages.length>0&&React.createElement('div',{className:'chat-scroll',style:{padding:'20px',display:'flex',flexDirection:'column',gap:'16px'}},
      messages.map((m,i)=>React.createElement('div',{key:i,style:{display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start'}},
        React.createElement('div',{className:'mono',style:{fontSize:'9px',textTransform:'uppercase',letterSpacing:'0.2em',color:'rgba(0,0,0,0.4)',marginBottom:'4px'}},m.role==='user'?'You':'ArgusScorer'),
        React.createElement('div',{style:{maxWidth:'85%',border:'2px solid black',padding:'12px 16px',background:m.role==='user'?'black':'white',color:m.role==='user'?'white':'black',fontSize:'14px',lineHeight:1.65,fontFamily:'Poppins'}},m.content)
      )),
      loading&&React.createElement('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
        React.createElement('span',{className:'spin',style:{fontSize:'16px'}},'⟳'),
        React.createElement('span',{className:'mono',style:{fontSize:'11px',color:'rgba(0,0,0,0.5)'}},'Thinking...')
      ),
      React.createElement('div',{ref:chatEndRef})
    ),
    error&&React.createElement('div',{style:{padding:'12px 20px'}},
      React.createElement(ErrorBanner,{message:error,onDismiss:()=>setError('')})
    ),
    React.createElement('div',{style:{borderTop:'2px solid black',padding:'16px',display:'flex',gap:'10px'}},
      React.createElement('textarea',{value:input,onChange:e=>setInput(e.target.value),onKeyDown:handleKey,placeholder:'Press Enter to send · Shift+Enter for newline',rows:2,
        style:{flex:1,border:'2px solid black',padding:'10px',fontFamily:'Poppins',fontSize:'14px',resize:'none',outline:'none',background:'hsl(60 14% 97%)'}}),
      React.createElement('button',{onClick:sendMessage,disabled:!input.trim()||loading,
        style:{fontFamily:'IBM Plex Mono',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.15em',fontWeight:700,border:'2px solid black',background:'black',color:'white',padding:'10px 18px',cursor:'pointer',flexShrink:0,alignSelf:'flex-end'}},
        loading?'…':'Send')
    )
  );
}

function ArgumentStrengthener({argument,result,onCompare}){
  const [loading,setLoading]=useState(false);
  const [strengthenResult,setStrengthenResult]=useState(null);
  const [improvedScore,setImprovedScore]=useState(null);
  const [rescoring,setRescoring]=useState(false);
  const [error,setError]=useState('');
  const [standaloneArg,setStandaloneArg]=useState('');
  const canSend=useRateLimiter(1500);

  const activeArg=argument||standaloneArg;
  const isStandalone=!argument;

  const runStrengthen=async()=>{
    if(!activeArg.trim())return;
    if(!canSend())return;
    setLoading(true);setError('');setStrengthenResult(null);setImprovedScore(null);
    try{
      const data = await apiPost('/api/strengthen', {
        argument: activeArg,
        scores: result
      });
      setStrengthenResult(data);
      if(data.improved_scores) setImprovedScore(data.improved_scores);
      setLoading(false);
    }catch(e){setError(e.message);setLoading(false);}
  };

  return React.createElement('div',{style:{marginTop:'20px',border:'2px solid black',background:'white',boxShadow:'4px 4px 0 black'}},
    React.createElement('div',{style:{borderBottom:'2px solid black',padding:'14px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'12px'}},
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:'12px'}},
        React.createElement('span',{style:{fontSize:'18px'}},'✦'),
        React.createElement('div',{},
          React.createElement('div',{className:'mono',style:{fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.22em',fontWeight:700}},'Argument Improvement Assistant')
        )
      ),
      !strengthenResult&&React.createElement('button',{onClick:runStrengthen,disabled:loading||!activeArg.trim(),
        style:{fontFamily:'IBM Plex Mono',fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.18em',fontWeight:700,border:'2px solid black',background:'black',color:'white',padding:'10px 18px',cursor:'pointer'}},
        loading?React.createElement(React.Fragment,null,React.createElement('span',{className:'spin'},'⟳'),' Strengthening…'):'→ Strengthen My Argument')
    ),

    isStandalone&&React.createElement('div',{style:{padding:'20px',borderBottom:'2px solid black'}},
      React.createElement('div',{className:'mono',style:{fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.22em',fontWeight:700,marginBottom:'8px'}},'Paste your argument'),
      React.createElement('textarea',{value:standaloneArg,onChange:e=>setStandaloneArg(e.target.value),
        placeholder:'You can strengthen any argument directly here without scoring first…',rows:6,
        style:{width:'100%',border:'2px solid black',padding:'14px',fontFamily:'Poppins',fontSize:'15px',outline:'none',resize:'vertical',background:'hsl(60 14% 97%)'}})
    ),

    error&&React.createElement('div',{style:{padding:'16px'}},React.createElement(ErrorBanner,{message:error,onDismiss:()=>setError('')})),

    !strengthenResult&&!loading&&React.createElement('div',{style:{padding:'24px'}},
      React.createElement('p',{className:'serif',style:{fontSize:'15px',fontStyle:'italic',color:'rgba(0,0,0,0.55)',lineHeight:1.6}},'The AI will rewrite your argument with better structure, added evidence, and tighter logic — displayed side-by-side with the original.')
    ),

    strengthenResult&&React.createElement('div',{style:{padding:'24px'}},
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:'20px',marginBottom:'24px'}},
        React.createElement('div',{style:{border:'2px solid black',padding:'20px',background:'hsl(60 14% 97%)'}},
          React.createElement('div',{className:'mono',style:{fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.22em',fontWeight:700,marginBottom:'12px',color:'rgba(0,0,0,0.5)'}},'Original'),
          React.createElement('p',{style:{fontSize:'16px',lineHeight:1.75,fontWeight:500,fontFamily:'Poppins'}},activeArg)
        ),
        React.createElement('div',{style:{border:'2px solid black',padding:'20px',background:'white',position:'relative'}},
          React.createElement('div',{style:{position:'absolute',top:'-2px',left:'-2px',background:'black',color:'white',padding:'3px 10px'}},
            React.createElement('span',{className:'mono',style:{fontSize:'9px',textTransform:'uppercase',letterSpacing:'0.2em',fontWeight:700}},'Strengthened ✦')
          ),
          React.createElement('p',{style:{fontSize:'16px',lineHeight:1.75,marginTop:'8px',fontWeight:500,fontFamily:'Poppins'}},strengthenResult.improved_argument)
        )
      ),
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:'16px',marginBottom:'20px'}},
        React.createElement('div',{style:{border:'2px solid black',padding:'16px'}},
          React.createElement('div',{className:'mono',style:{fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.22em',fontWeight:700,marginBottom:'12px'}},'Changes Made'),
          React.createElement('ul',{style:{listStyle:'none',display:'flex',flexDirection:'column',gap:'8px'}},
            (strengthenResult.changes_made||[]).map((c,i)=>React.createElement('li',{key:i,style:{display:'flex',gap:'10px',fontSize:'13px',lineHeight:1.55}},
              React.createElement('span',{className:'mono',style:{fontWeight:700,flexShrink:0}},String(i+1).padStart(2,'0')),
              React.createElement('span',{},c)
            ))
          )
        ),
        React.createElement('div',{style:{border:'2px solid black',padding:'16px'}},
          React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}},
            React.createElement('div',{className:'mono',style:{fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.22em',fontWeight:700}},'Verified Scores'),
            improvedScore&&React.createElement('span',{className:'mono',style:{fontSize:'10px',color:'#10B981',fontWeight:700}},'✓ Real Score')
          ),
          ['logic','evidence','clarity','depth'].map(k=>React.createElement('div',{key:k,style:{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid rgba(0,0,0,0.1)',padding:'6px 0'}},
            React.createElement('span',{className:'mono',style:{fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.15em'}},[k]),
            React.createElement('span',{className:'mono',style:{fontSize:'18px',fontWeight:700}},
              result&&React.createElement('span',{style:{color:'rgba(0,0,0,0.35)',fontSize:'13px',fontWeight:400}},result[k],' → '),
              improvedScore
                ? React.createElement('span',{style:{color:improvedScore[k]>=(result?.[k]||0)?'#10B981':'#DC2626'}},improvedScore[k])
                : React.createElement('span',{style:{color:'rgba(0,0,0,0.25)'}},'-')
            )
          )),
          improvedScore&&React.createElement('div',{style:{marginTop:'10px',paddingTop:'10px',borderTop:'2px solid black',display:'flex',justifyContent:'space-between',alignItems:'baseline'}},
            React.createElement('span',{className:'mono',style:{fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.15em'}},'Overall'),
            React.createElement('span',{className:'mono',style:{fontSize:'22px',fontWeight:900}},
              result&&React.createElement('span',{style:{color:'rgba(0,0,0,0.35)',fontSize:'13px',fontWeight:400}},result.overall_score.toFixed(1),' → '),
              React.createElement('span',{style:{color:improvedScore.overall_score>=(result?.overall_score||0)?'#10B981':'#DC2626'}},improvedScore.overall_score.toFixed(1))
            )
          )
        )
      ),
      onCompare&&React.createElement('button',{onClick:()=>onCompare(activeArg,strengthenResult.improved_argument),
        style:{fontFamily:'IBM Plex Mono',fontSize:'12px',textTransform:'uppercase',letterSpacing:'0.2em',fontWeight:700,border:'2px solid black',background:'white',padding:'12px 24px',cursor:'pointer',boxShadow:'3px 3px 0 black',width:'100%'}},
        '⚖ Compare Original vs Improved')
    )
  );
}

function ScoreCard({result}){
  const [explainPanel,setExplainPanel]=useState(null);
  const biasMap={Low:{bg:'#9EE493',color:'black'},Medium:{bg:'#F6D452',color:'black'},High:{bg:'#DC2626',color:'white'}};
  const confMap={High:{bg:'black',color:'white'},Medium:{bg:'#E5E5E5',color:'black'},Low:{bg:'white',color:'black'}};
  const bm=biasMap[result.bias]||biasMap.Medium;
  const cm=confMap[result.confidence]||confMap.Medium;
  const dims=['Logic','Evidence','Clarity','Depth'];

  return React.createElement(React.Fragment,null,
    explainPanel&&React.createElement(DimensionExplainPanel,{
      dimension:explainPanel.dimension,
      value:explainPanel.value,
      argument:result.argument,
      onClose:()=>setExplainPanel(null)
    }),
    React.createElement('section',{className:'snap-in',style:{background:'white',border:'2px solid black',boxShadow:'4px 4px 0 #0a0a0a',padding:'clamp(24px,4vw,40px)'}},
      React.createElement('div',{style:{display:'flex',flexWrap:'wrap',alignItems:'flex-end',justifyContent:'space-between',gap:'24px',borderBottom:'2px solid black',paddingBottom:'24px',marginBottom:'32px'}},
        React.createElement('div',{},
          React.createElement('div',{className:'mono',style:{fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.25em',fontWeight:600,color:'rgba(0,0,0,0.6)',marginBottom:'8px'}},'Overall Verdict'),
          React.createElement('div',{style:{display:'flex',alignItems:'baseline',gap:'8px'}},
            React.createElement('span',{className:'mono',style:{fontSize:'clamp(72px,12vw,110px)',fontWeight:900,lineHeight:1,letterSpacing:'-0.04em'}},result.overall_score.toFixed(1)),
            React.createElement('span',{className:'serif',style:{fontSize:'28px',fontStyle:'italic',color:'rgba(0,0,0,0.5)'}},'/\u00a010')
          ),
          React.createElement('div',{className:'mono',style:{fontSize:'13px',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.18em',marginTop:'8px',padding:'6px 14px',display:'inline-block',border:'2px solid black',background:result.overall_score<4?'#DC2626':result.overall_score<7?'#F59E0B':'#10B981',color:'white'}},
            result.overall_score<4?'Weak':result.overall_score<7?'Medium':'Strong'
          )
        ),
        React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:'10px'}},
          React.createElement(Badge,{text:'Bias · '+result.bias,...bm}),
          React.createElement(Badge,{text:'Confidence · '+result.confidence,...cm})
        )
      ),
      React.createElement('div',{className:'mono',style:{fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.22em',color:'rgba(0,0,0,0.5)',marginBottom:'16px'}},'↑ Click any score bar for an explanation'),
      React.createElement('div',{className:'grid-4',style:{marginBottom:'40px'}},
        dims.map(dim=>React.createElement(SegBar,{
          key:dim,label:dim,value:result[dim.toLowerCase()],clickable:true,
          onClick:()=>setExplainPanel({dimension:dim,value:result[dim.toLowerCase()]})
        }))
      ),
      React.createElement('div',{style:{marginBottom:'40px'}},
        React.createElement('h3',{className:'serif',style:{fontSize:'26px',fontWeight:700,borderBottom:'3px solid black',paddingBottom:'4px',display:'inline-block',marginBottom:'12px'}},'Explanation'),
